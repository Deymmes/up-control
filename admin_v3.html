<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Up Controle - Admin V1.2</title>
    
    <link rel="manifest" href="manifest_admin.json" crossorigin="use-credentials">
    <link rel="apple-touch-icon" href="iconadmin.png">
    <link rel="icon" type="image/png" href="iconadmin.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { 
            --up-blue: #1a73e8; 
            --bg-light: #f3f4f6;
            --text-main: #111827;
            --text-soft: #6b7280;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.03);
            --pink-bg: #fdf2f8; --pink-icon: #db2777;
            --green-bg: #f0fdf4; --green-icon: #16a34a;
            --blue-bg: #eff6ff; --blue-icon: #2563eb;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background-color: var(--bg-light); color: var(--text-main);
            margin: 0; padding: 0; -webkit-font-smoothing: antialiased;
        }

        /* BARRA DE TOPO FIXA */
        .top-bar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 15px 20px; text-align: left;
        }
        .top-bar h1 { margin: 0; font-size: 1.1em; font-weight: 800; color: var(--up-blue); }
        .top-bar p { margin: 0; font-size: 0.65em; color: var(--text-soft); font-weight: 700; text-transform: uppercase; }

        .admin-container { max-width: 500px; margin: auto; padding: 15px; }

        /* ANALYTICS */
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card-mini { 
            background: white; padding: 12px; border-radius: 18px; 
            text-align: center; box-shadow: var(--card-shadow);
        }
        .card-mini span { display: block; font-size: 0.55em; font-weight: 800; color: var(--text-soft); text-transform: uppercase; margin-bottom: 4px; }
        .card-mini b { font-size: 1.2em; font-weight: 900; }

        /* CRESCIMENTO / ESTATÍSTICAS */
        .crescimento-card { background: white; padding: 18px; border-radius: 22px; margin-bottom: 20px; box-shadow: var(--card-shadow); }
        .crescimento-titulo { font-size: 0.75em; font-weight: 800; color: var(--text-main); text-transform: uppercase; margin-bottom: 12px; display: block; }
        .tabela-crescimento { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        .tabela-crescimento td { padding: 10px 0; border-top: 1px solid #f9fafb; color: var(--text-soft); }
        .tabela-crescimento td:first-child { color: var(--text-main); font-weight: 700; text-transform: capitalize; }
        .tabela-crescimento b { color: var(--up-blue); }
        
        .btn-expande { 
            background: none; border: none; color: var(--up-blue); font-size: 0.75em; 
            font-weight: 700; padding: 10px 0 0; cursor: pointer; display: block;
        }

        /* CONTROLES */
        .controles { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 20px; scrollbar-width: none; }
        .controles::-webkit-scrollbar { display: none; }
        .btn { 
            background: white; border: 1px solid #e5e7eb; padding: 10px 16px; 
            border-radius: 50px; cursor: pointer; font-weight: 700; font-size: 0.65em; 
            color: var(--text-soft); text-transform: uppercase; white-space: nowrap; transition: 0.2s;
        }
        .btn-refresh { background: var(--text-main); color: white; border: none; }
        .btn-ativo { background: var(--up-blue); color: white; border-color: var(--up-blue); }

        /* CARDS DE REGISTRO ESTILO MODELO */
        .registro-card { 
            background: white; border-radius: 22px; padding: 15px; margin-bottom: 12px; 
            box-shadow: var(--card-shadow); display: flex; align-items: center; gap: 15px;
            position: relative; overflow: hidden;
        }
        .icon-box {
            width: 45px; height: 45px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; font-size: 1.2em;
            flex-shrink: 0;
        }
        .icon-saida { background: var(--pink-bg); color: var(--pink-icon); }
        .icon-devolucao { background: var(--green-bg); color: var(--green-icon); }
        .icon-pendente { background: var(--blue-bg); color: var(--blue-icon); }

        .reg-info { flex-grow: 1; }
        .reg-nome { font-weight: 800; color: var(--text-main); font-size: 0.9em; letter-spacing: -0.2px; }
        .reg-data { font-size: 0.65em; color: var(--text-soft); font-weight: 600; }
        
        .reg-resumo { font-size: 0.75em; color: var(--text-soft); margin-top: 6px; line-height: 1.4; }
        .reg-resumo b { color: var(--text-main); }

        .badge-correcao { 
            position: absolute; top: 12px; right: 12px; 
            background: #fef3c7; color: #92400e; font-size: 8px; 
            font-weight: 800; padding: 3px 6px; border-radius: 5px; 
        }

        .justificativa-box { 
            background: #fef2f2; padding: 8px; margin-top: 8px; 
            color: #991b1b; border-radius: 10px; font-size: 0.7em; font-weight: 600;
        }

        .modo-concluido { opacity: 0.4; filter: grayscale(1); }
        .btn-limpar { background: none; border: none; color: #d1d5db; font-size: 0.6em; width: 100%; margin: 20px 0; cursor: pointer; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>Up Controle Administrativo</h1>
    <p>Gestão de Movimentação • V1.2</p>
</div>

<div class="admin-container">
    <div class="analytics-grid">
        <div class="card-mini"><span>No Mês</span><b id="an-mes">0</b></div>
        <div class="card-mini"><span>Na Rua</span><b id="an-rua" style="color:var(--up-blue)">0</b></div>
        <div class="card-mini"><span>Histórico</span><b id="an-ok">0</b></div>
    </div>

    <div class="crescimento-card">
        <span class="crescimento-titulo">Movimentação Mensal</span>
        <table class="tabela-crescimento">
            <tbody id="corpo-crescimento"></tbody>
        </table>
        <button class="btn-expande" id="btn-estatisticas" onclick="toggleEstatisticas()">Estatísticas</button>
    </div>

    <div class="controles">
        <button class="btn btn-refresh" onclick="location.reload()">Sync</button>
        <button class="btn" id="btn-perdas" onclick="setFiltro('perdas')">Ocorrências</button>
        <button class="btn" id="btn-devolvidos" onclick="setFiltro('devolvidos')">Devoluções</button>
        <button class="btn" id="btn-tudo" onclick="setFiltro('tudo')">Tudo</button>
    </div>

    <div id="lista-feed"></div>

    <button class="btn-limpar" onclick="limparHistorico()">Zerar Sistema</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYe0mjBHOY9C-X2u3PzLkJZkmnWCcv8gc",
        authDomain: "up-controle-bd307.firebaseapp.com",
        projectId: "up-controle-bd307",
        storageBucket: "up-controle-bd307.firebasestorage.app",
        messagingSenderId: "56963795860",
        appId: "1:56963795860:web:eb9ba04de1ac98e7299d81"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let filtroAtivo = 'ativos';
    let globalSnap = [];
    let mostrarTudoStats = false;

    db.collection("movimentacoes").orderBy("dataRegistro", "desc").onSnapshot(snap => {
        globalSnap = [];
        snap.forEach(doc => globalSnap.push({id: doc.id, ...doc.data()}));
        processarERenderizar();
    });

    function processarERenderizar() {
        let eventosAgrupados = {};
        let eventosMap = {}; 
        let crescimentoMap = {};
        let eventosConcluidos = new Set();
        const agora = new Date();
        const mesAtualAbrev = agora.toLocaleString('pt-BR', { month: 'short' }).replace('.', '');

        globalSnap.forEach(d => {
            const chaveEv = (d.evento.toUpperCase().trim() + d.dataEvento).replace(/\s+/g, '');
            if (d.tipo === 'Correção') {
                const chaveOriginal = chaveEv + 'Saída';
                if (eventosAgrupados[chaveOriginal]) {
                    eventosAgrupados[chaveOriginal].itens = d.itens;
                    eventosAgrupados[chaveOriginal].correcoes = (eventosAgrupados[chaveOriginal].correcoes || 0) + 1;
                }
                return;
            }
            const chaveCard = chaveEv + d.tipo;
            if (!eventosAgrupados[chaveCard]) {
                eventosAgrupados[chaveCard] = { ...d, correcoes: 0 };
            }
        });

        let listaFinal = Object.values(eventosAgrupados);

        listaFinal.forEach(m => {
            const dataReg = new Date(m.dataRegistro);
            const mesAbrev = dataReg.toLocaleString('pt-BR', { month: 'short' }).replace('.', '');
            const chaveEv = (m.evento.toUpperCase().trim() + m.dataEvento).replace(/\s+/g, '');
            
            if (!eventosMap[chaveEv]) eventosMap[chaveEv] = { s: 0, v: 0 };
            let soma = Object.values(m.itens).reduce((a, b) => a + (parseInt(b) || 0), 0);
            
            if (m.tipo === 'Saída') {
                eventosMap[chaveEv].s += soma;
                if (!crescimentoMap[mesAbrev]) crescimentoMap[mesAbrev] = { count: new Set(), itens: 0, rawDate: dataReg };
                crescimentoMap[mesAbrev].count.add(chaveEv);
                crescimentoMap[mesAbrev].itens += soma;
            }
            if (m.tipo === 'Devolução') eventosMap[chaveEv].v += soma;
        });

        let naRuaTotal = 0;
        for (let ev in eventosMap) {
            if (eventosMap[ev].s > 0 && eventosMap[ev].s === eventosMap[ev].v) {
                eventosConcluidos.add(ev);
            } else if (eventosMap[ev].s > 0) {
                naRuaTotal++;
            }
        }

        document.getElementById('an-mes').innerText = crescimentoMap[mesAtualAbrev] ? crescimentoMap[mesAtualAbrev].count.size : 0;
        document.getElementById('an-rua').innerText = naRuaTotal;
        document.getElementById('an-ok').innerText = eventosConcluidos.size;

        renderizarTabela(crescimentoMap);
        renderizarFeed(listaFinal, eventosConcluidos);
    }

    function renderizarTabela(map) {
        const corpo = document.getElementById('corpo-crescimento');
        corpo.innerHTML = "";
        const ordenados = Object.keys(map).sort((a, b) => map[b].rawDate - map[a].rawDate);
        
        const limit = mostrarTudoStats ? ordenados.length : 2;
        ordenados.slice(0, limit).forEach(mes => {
            corpo.innerHTML += `<tr><td style="text-transform:capitalize">${mes}</td><td><b>${map[mes].count.size}</b> eventos</td><td style="text-align:right">${map[mes].itens} itens</td></tr>`;
        });
    }

    function toggleEstatisticas() {
        mostrarTudoStats = !mostrarTudoStats;
        document.getElementById('btn-estatisticas').innerText = mostrarTudoStats ? "Ver Menos" : "Estatísticas";
        processarERenderizar();
    }

    function renderizarFeed(lista, concluidos) {
        const feed = document.getElementById('lista-feed');
        feed.innerHTML = "";
        
        let filtrados = lista;
        if (filtroAtivo === 'ativos') {
            filtrados = lista.filter(d => d.tipo === 'Saída' && !concluidos.has((d.evento.toUpperCase().trim() + d.dataEvento).replace(/\s+/g, '')));
        } else if (filtroAtivo === 'perdas') {
            filtrados = lista.filter(d => d.justificativa);
        } else if (filtroAtivo === 'devolvidos') {
            filtrados = lista.filter(d => d.tipo === 'Devolução');
        }

        filtrados.forEach(m => {
            const dt = new Date(m.dataRegistro).toLocaleString("pt-BR", {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
            let itTxt = "";
            for (let i in m.itens) if(m.itens[i] > 0) itTxt += `<b>${m.itens[i]}</b> ${i}, `;
            itTxt = itTxt.replace(/, $/ , "");

            const chave = (m.evento.toUpperCase().trim() + m.dataEvento).replace(/\s+/g, '');
            const ok = concluidos.has(chave);
            const corrigido = m.correcoes > 0;

            let iconClass = "icon-pendente"; let iconSymbol = "📦";
            if(m.tipo === 'Saída') { iconClass = "icon-saida"; iconSymbol = "📤"; }
            if(m.tipo === 'Devolução') { iconClass = "icon-devolucao"; iconSymbol = "📥"; }

            feed.innerHTML += `
                <div class="registro-card ${ok && filtroAtivo === 'tudo' ? 'modo-concluido' : ''}">
                    ${corrigido ? `<div class="badge-correcao">✏️ EDITADO</div>` : ""}
                    <div class="icon-box ${iconClass}">${iconSymbol}</div>
                    <div class="reg-info">
                        <div class="reg-nome">${m.evento.toUpperCase()}</div>
                        <div class="reg-data">${dt} • ${m.responsavel.toUpperCase()}</div>
                        <div class="reg-resumo">${itTxt}</div>
                        ${m.justificativa ? `<div class="justificativa-box">⚠️ ${m.justificativa}</div>` : ''}
                    </div>
                </div>`;
        });
    }

    function setFiltro(t) {
        filtroAtivo = (filtroAtivo === t) ? 'ativos' : t;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('btn-ativo'));
        if(filtroAtivo !== 'ativos') document.getElementById('btn-' + t).classList.add('btn-ativo');
        processarERenderizar();
    }

    async function limparHistorico() {
        const senha = prompt("Senha Master:");
        if (senha === "admin123") {
            if (confirm("Deseja zerar o sistema?")) {
                const res = await db.collection("movimentacoes").get();
                const batch = db.batch();
                res.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                location.reload();
            }
        }
    }
</script>
</body>
</html>

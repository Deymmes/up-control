<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Up Controle - Admin V3.2</title>
    
    <link rel="manifest" href="manifest_admin.json" crossorigin="use-credentials">
    <link rel="apple-touch-icon" href="iconadmin.png">
    <link rel="icon" type="image/png" href="iconadmin.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { 
            --primary: #1a73e8; 
            --secondary: #ff0080; 
            --bg: #f0f2f5; 
            --success: #25D366;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('fundoadmin.jpg'); 
            background-size: cover; background-attachment: fixed; background-position: center;
            margin: 0; padding: 15px; min-height: 100vh;
        }

        .admin-container { max-width: 600px; margin: auto; }

        header { 
            background: linear-gradient(135deg, rgba(26, 115, 232, 0.9), rgba(255, 0, 128, 0.9));
            color: white; padding: 25px 15px; border-radius: 20px; margin-bottom: 15px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); backdrop-filter: blur(10px);
        }

        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card-mini { background: var(--glass); padding: 12px 5px; border-radius: 15px; text-align: center; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
        .card-mini span { display: block; font-size: 0.6em; font-weight: bold; color: #666; text-transform: uppercase; }
        .card-mini b { font-size: 1.1em; color: var(--primary); }

        .crescimento-card { background: var(--glass); padding: 15px; border-radius: 20px; margin-bottom: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
        .crescimento-titulo { font-size: 0.7em; font-weight: 900; color: #444; text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        .tabela-crescimento { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        .tabela-crescimento th { text-align: left; color: #888; padding-bottom: 8px; font-size: 0.9em; }
        .tabela-crescimento td { padding: 8px 0; border-top: 1px solid rgba(0,0,0,0.05); color: #333; }
        .tabela-crescimento b { color: var(--primary); }

        .card-main { background: var(--glass); padding: 15px; border-radius: 20px; backdrop-filter: blur(10px); }
        .controles { display: grid; grid-template-columns: 0.5fr 1fr 1fr 0.8fr; gap: 8px; margin-bottom: 15px; }
        .btn { border: none; padding: 10px 5px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 0.75em; color: white; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; opacity: 0.85; }
        .btn-refresh { background: var(--primary); opacity: 1; }
        .btn-filter { background: #555; }
        .btn-success { background: var(--success); }
        .btn-arquivo { background: #454d55; }
        .btn-ativo { opacity: 1; outline: 3px solid white; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .registro-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #eee; position: relative; overflow: hidden; }
        .reg-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .reg-nome { font-weight: bold; color: #222; font-size: 0.9em; }
        .status-badge { font-size: 0.6em; padding: 4px 8px; border-radius: 6px; font-weight: 900; }
        .badge-saida { background: #fff0f6; color: #ff0080; }
        .badge-devolucao { background: #e6ffed; color: #28a745; }
        .reg-resumo { font-size: 0.8em; color: #555; background: #f9f9f9; padding: 8px; border-radius: 10px; }
        .badge-correcao { position: absolute; top: 0; right: 0; background: #ffc107; color: #333; font-size: 10px; font-weight: 800; padding: 3px 8px; border-bottom-left-radius: 12px; }
        .modo-concluido { border-left: 8px solid #cbd5e0; opacity: 0.5; filter: grayscale(0.4); }
        .btn-limpar { background: none; border: none; color: #bbb; font-size: 0.7em; width: 100%; margin-top: 20px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-container">
    <header>
        <h1>Up Controle Admin</h1>
        <p style="margin:0; font-size:0.7em; opacity:0.8;">GESTÃO ESTRATÉGICA V3.2</p>
    </header>

    <div class="analytics-grid">
        <div class="card-mini"><span>Eventos/Mês</span><b id="an-mes">0</b></div>
        <div class="card-mini"><span>Na Rua</span><b id="an-rua" style="color:var(--secondary)">0</b></div>
        <div class="card-mini"><span>Concluídos</span><b id="an-ok" style="color:var(--success)">0</b></div>
    </div>

    <div class="crescimento-card">
        <span class="crescimento-titulo">📈 Crescimento Mensal</span>
        <table class="tabela-crescimento">
            <thead>
                <tr>
                    <th>Mês/Ano</th>
                    <th>Eventos</th>
                    <th>Itens</th>
                </tr>
            </thead>
            <tbody id="corpo-crescimento">
                <tr><td colspan="3" style="text-align:center; color:#999;">Processando histórico...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="card-main">
        <div class="controles">
            <button class="btn btn-refresh" onclick="location.reload()">🔄</button>
            <button class="btn btn-filter" id="btn-perdas" onclick="setFiltro('perdas')">⚠️ Perdas</button>
            <button class="btn btn-success" id="btn-devolvidos" onclick="setFiltro('devolvidos')">✅ OK</button>
            <button class="btn btn-arquivo" id="btn-tudo" onclick="setFiltro('tudo')">📁 Tudo</button>
        </div>
        <div id="lista-feed"><div style="text-align:center; color:#999; padding:20px;">Carregando registros...</div></div>
        <button class="btn-limpar" onclick="limparHistorico()">Limpar histórico do sistema</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYe0mjBHOY9C-X2u3PzLkJZkmnWCcv8gc",
        authDomain: "up-controle-bd307.firebaseapp.com",
        projectId: "up-controle-bd307",
        storageBucket: "up-controle-bd307.firebasestorage.app",
        messagingSenderId: "56963795860",
        appId: "1:56963795860:web:eb9ba04de1ac98e7299d81"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let filtroAtivo = 'ativos';
    let globalSnap = [];

    db.collection("movimentacoes").orderBy("dataRegistro", "desc").onSnapshot(snap => {
        globalSnap = [];
        snap.forEach(doc => globalSnap.push({id: doc.id, ...doc.data()}));
        processarERenderizar();
    });

    function processarERenderizar() {
        let eventosAgrupados = {};
        let eventosMap = {}; 
        let crescimentoMap = {};
        let eventosConcluidos = new Set();
        const agora = new Date();
        const mesAtualLong = agora.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });

        // 1. Agrupamento de Saídas e Correções
        globalSnap.forEach(d => {
            const chaveEv = (d.evento.toUpperCase().trim() + d.dataEvento).replace(/\s+/g, '');
            if (d.tipo === 'Correção') {
                const chaveOriginal = chaveEv + 'Saída';
                if (eventosAgrupados[chaveOriginal]) {
                    eventosAgrupados[chaveOriginal].itens = d.itens;
                    eventosAgrupados[chaveOriginal].correcoes = (eventosAgrupados[chaveOriginal].correcoes || 0) + 1;
                }
                return;
            }
            const chaveCard = chaveEv + d.tipo;
            if (!eventosAgrupados[chaveCard]) {
                eventosAgrupados[chaveCard] = { ...d, correcoes: 0 };
            }
        });

        let listaFinal = Object.values(eventosAgrupados);

        // 2. Balanço Patrimonial e Crescimento Mensal
        listaFinal.forEach(m => {
            const dataReg = new Date(m.dataRegistro);
            const mesAnoLabel = dataReg.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
            const chaveEv = (m.evento.toUpperCase().trim() + m.dataEvento).replace(/\s+/g, '');
            
            if (!eventosMap[chaveEv]) eventosMap[chaveEv] = { s: 0, v: 0 };
            let somaItens = Object.values(m.itens).reduce((a, b) => a + (parseInt(b) || 0), 0);
            
            if (m.tipo === 'Saída') {
                eventosMap[chaveEv].s += somaItens;
                if (!crescimentoMap[mesAnoLabel]) crescimentoMap[mesAnoLabel] = { count: new Set(), totalItens: 0 };
                crescimentoMap[mesAnoLabel].count.add(chaveEv);
                crescimentoMap[mesAnoLabel].totalItens += somaItens;
            }
            if (m.tipo === 'Devolução') {
                eventosMap[chaveEv].v += somaItens;
            }
        });

        // 3. Cálculo do Painel Superior
        let naRuaContagem = 0;
        for (let ev in eventosMap) {
            const isFullReturn = eventosMap[ev].s > 0 && eventosMap[ev].s === eventosMap[ev].v;
            if (isFullReturn) {
                eventosConcluidos.add(ev);
            } else if (eventosMap[ev].s > 0) {
                naRuaContagem++;
            }
        }

        document.getElementById('an-mes').innerText = crescimentoMap[mesAtualLong] ? crescimentoMap[mesAtualLong].count.size : 0;
        document.getElementById('an-rua').innerText = naRuaContagem;
        document.getElementById('an-ok').innerText = eventosConcluidos.size;

        renderizarTabela(crescimentoMap);
        renderizarFeed(listaFinal, eventosConcluidos);
    }

    function renderizarTabela(map) {
        const corpo = document.getElementById('corpo-crescimento');
        corpo.innerHTML = "";
        const meses = Object.keys(map).sort((a, b) => new Date(b) - new Date(a));
        meses.forEach(m => {
            corpo.innerHTML += `<tr><td style="text-transform:capitalize">${m}</td><td><b>${map[m].count.size}</b></td><td>${map[m].totalItens}</td></tr>`;
        });
    }

    function renderizarFeed(lista, concluidos) {
        const feed = document.getElementById('lista-feed');
        feed.innerHTML = "";
        
        let filtrados = lista;
        if (filtroAtivo === 'ativos') {
            filtrados = lista.filter(d => d.tipo === 'Saída' && !concluidos.has((d.evento.toUpperCase().trim() + d.dataEvento).replace(/\s+/g, '')));
        } else if (filtroAtivo === 'perdas') {
            filtrados = lista.filter(d => d.justificativa);
        } else if (filtroAtivo === 'devolvidos') {
            filtrados = lista.filter(d => d.tipo === 'Devolução');
        }

        if (filtrados.length === 0) {
            feed.innerHTML = `<div style="text-align:center; padding:30px; color:#999;">Nenhum registro encontrado.</div>`;
            return;
        }

        filtrados.forEach(m => {
            const dt = new Date(m.dataRegistro).toLocaleString("pt-BR", {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
            let itTxt = "";
            for (let i in m.itens) if(m.itens[i] > 0) itTxt += `<b>${m.itens[i]}</b> ${i}, `;
            itTxt = itTxt.replace(/, $/ , "");

            const chave = (m.evento.toUpperCase().trim() + m.dataEvento).replace(/\s+/g, '');
            const ok = concluidos.has(chave);
            const badge = m.correcoes > 0 ? `<div class="badge-correcao">✏️ ${m.correcoes} CORREÇÃO</div>` : "";

            feed.innerHTML += `
                <div class="registro-card ${ok && filtroAtivo === 'tudo' ? 'modo-concluido' : ''}">
                    ${badge}
                    <div class="reg-header">
                        <div><div class="reg-nome">${m.evento.toUpperCase()}</div><div class="reg-data">${dt} • ${m.responsavel.toUpperCase()}</div></div>
                        <span class="status-badge ${m.tipo === 'Saída' ? 'badge-saida' : 'badge-devolucao'}">${m.tipo}</span>
                    </div>
                    <div class="reg-resumo">${itTxt || 'Vazio'}</div>
                    ${m.justificativa ? `<div style="background:#fff5f5;border:1px solid #feb2b2;padding:8px;margin-top:8px;color:#c53030;border-radius:8px;font-size:0.8em;"><b>⚠️ Ocorrência:</b> ${m.justificativa}</div>` : ''}
                </div>`;
        });
    }

    function setFiltro(t) {
        filtroAtivo = (filtroAtivo === t) ? 'ativos' : t;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('btn-ativo'));
        if(filtroAtivo !== 'ativos') document.getElementById('btn-' + t).classList.add('btn-ativo');
        processarERenderizar();
    }

    async function limparHistorico() {
        const senha = prompt("Senha Master:");
        if (senha === "admin123") {
            if (confirm("Isso apagará todos os dados do servidor. Confirma?")) {
                const registros = await db.collection("movimentacoes").get();
                const batch = db.batch();
                registros.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                alert("Sistema zerado com sucesso.");
                location.reload();
            }
        }
    }
</script>
</body>
</html>

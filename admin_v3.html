<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Up Controle - Admin V1.2</title>
    
    <link rel="manifest" href="manifest_admin.json" crossorigin="use-credentials">
    <link rel="apple-touch-icon" href="iconadmin.png">
    <link rel="icon" type="image/png" href="iconadmin.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { 
            --up-blue: #1a73e8; 
            --bg-light: #f6f8fa;
            --text-main: #1a1c1e;
            --text-soft: #656c76;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.03); /* Sombras mais leves para o vidro */
            
            /* Cores dos Ícones (Soft UI) */
            --pink-bg: #fdf2f8; --pink-stroke: #db2777;
            --green-bg: #f0fdf4; --green-stroke: #16a34a;
            --blue-bg: #eff6ff; --blue-stroke: #1a73e8;
            --red-bg: #fef2f2; --red-stroke: #dc2626;

            /* Configuração do Efeito Vidro (Glassmorphism) */
            --glass-bg: rgba(255, 255, 255, 0.75); /* Branco bem transparente */
            --glass-blur: blur(15px); /* Desfoque forte */
            --glass-border: 1px solid rgba(255, 255, 255, 0.2); /* Borda de brilho */
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background-color: var(--bg-light); color: var(--text-main);
            margin: 0; padding: 0; -webkit-font-smoothing: antialiased;
        }

        /* BARRA DE TOPO FIXA COM EFEITO VIDRO */
        .top-header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--glass-bg); /* MUDANÇA: Fundo de Vidro */
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); /* MUDANÇA: Desfoque */
            border-bottom: 1px solid rgba(0,0,0,0.06);
            padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-info h1 { margin: 0; font-size: 1.1em; font-weight: 800; color: var(--up-blue); letter-spacing: -0.5px; }
        .header-info p { margin: 0; font-size: 0.65em; color: var(--text-soft); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
        
        .app-logo { width: 42px; height: 42px; object-fit: contain; }

        .admin-container { max-width: 500px; margin: auto; padding: 20px 15px; }

        /* ANALYTICS (Branco sólido para contraste) */
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .card-mini { background: white; padding: 15px 10px; border-radius: 20px; text-align: center; box-shadow: var(--card-shadow); }
        .card-mini span { display: block; font-size: 0.55em; font-weight: 800; color: var(--text-soft); text-transform: uppercase; margin-bottom: 5px; }
        .card-mini b { font-size: 1.25em; font-weight: 900; }

        /* ESTATÍSTICAS (Efeito Vidro Sutil) */
        .crescimento-card { 
            background: var(--glass-bg); /* MUDANÇA: Fundo Vidro */
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); /* MUDANÇA: Desfoque sutil */
            padding: 20px; border-radius: 24px; margin-bottom: 25px; 
            box-shadow: var(--card-shadow); border: var(--glass-border); /* MUDANÇA: Borda brilho */
        }
        .crescimento-titulo { font-size: 0.75em; font-weight: 800; color: var(--text-main); text-transform: uppercase; margin-bottom: 15px; display: block; }
        .tabela-crescimento { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        .tabela-crescimento td { padding: 12px 0; border-top: 1px solid rgba(0,0,0,0.03); color: var(--text-soft); }
        .tabela-crescimento td:first-child { color: var(--text-main); font-weight: 700; text-transform: capitalize; }
        .tabela-crescimento b { color: var(--up-blue); }
        .btn-estatisticas { background: none; border: none; color: var(--up-blue); font-size: 0.75em; font-weight: 700; padding: 12px 0 0; cursor: pointer; display: block; }

        /* CONTROLES */
        .controles { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 20px; scrollbar-width: none; }
        .controles::-webkit-scrollbar { display: none; }
        .btn { 
            background: white; border: 1px solid #e9ecef; padding: 10px 18px; 
            border-radius: 50px; cursor: pointer; font-weight: 700; font-size: 0.65em; 
            color: var(--text-soft); text-transform: uppercase; white-space: nowrap; transition: 0.2s;
        }
        .btn-refresh { background: var(--text-main); color: white; border: none; }
        .btn-ativo { background: var(--up-blue); color: white; border-color: var(--up-blue); box-shadow: 0 4px 10px rgba(26, 115, 232, 0.2); }

        /* CARDS CONFORME RASCUNHO (Efeito Vidro Reforçado) */
        .registro-card { 
            background: rgba(255, 255, 255, 0.6); /* MUDANÇA: Fundo Vidro mais transparente */
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); /* MUDANÇA: Desfoque */
            border: var(--glass-border); /* MUDANÇA: Borda brilho */
            border-radius: 24px; padding: 18px; margin-bottom: 15px; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04); /* Sombras mais "glassy" */
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }
        .reg-top-row { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        
        .icon-circle {
            width: 48px; height: 48px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .icon-saida { background: var(--pink-bg); color: var(--pink-stroke); }
        .icon-devolucao { background: var(--green-bg); color: var(--green-stroke); }
        .icon-pendente { background: var(--blue-bg); color: var(--blue-stroke); }
        .icon-erro { background: var(--red-bg); color: var(--red-stroke); }

        .reg-nome { font-weight: 800; color: var(--text-main); font-size: 0.95em; letter-spacing: -0.3px; }
        .reg-sub { font-size: 0.65em; color: var(--text-soft); font-weight: 600; margin-top: 2px; }
        
        .reg-resumo { 
            font-size: 0.8em; color: var(--text-soft); 
            line-height: 1.5; background: rgba(248, 249, 250, 0.5); /* MUDANÇA: Fundo interno semi-transparente */
            padding: 12px; border-radius: 14px; width: 100%; box-sizing: border-box;
        }
        .reg-resumo b { color: var(--text-main); }

        .badge-edit { position: absolute; top: 15px; right: 15px; background: #fff9db; color: #f08c00; font-size: 8px; font-weight: 900; padding: 4px 8px; border-radius: 6px; }
        .justificativa-box { background: rgba(255, 245, 245, 0.7); padding: 10px; margin-top: 10px; color: #c92a2a; border-radius: 10px; font-size: 0.7em; font-weight: 600; display: flex; align-items: center; gap: 5px; }

        .modo-concluido { opacity: 0.4; filter: grayscale(1); }
        .btn-limpar { background: none; border: none; color: #dee2e6; font-size: 0.65em; width: 100%; margin: 20px 0; cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="top-header">
    <div class="header-info">
        <h1>Up Controle</h1>
        <p>Administrativo • V1.2</p>
    </div>
    <img src="logo.svg" alt="Logo" class="app-logo">
</div>

<div class="admin-container">
    <div class="analytics-grid">
        <div class="card-mini"><span>Mês</span><b id="an-mes">0</b></div>
        <div class="card-mini"><span>Externo</span><b id="an-rua" style="color:var(--up-blue)">0</b></div>
        <div class="card-mini"><span>Entregue</span><b id="an-ok">0</b></div>
    </div>

    <div class="crescimento-card">
        <span class="crescimento-titulo">Estatísticas</span>
        <table class="tabela-crescimento">
            <tbody id="corpo-crescimento">
                <tr><td colspan="3" style="text-align:center;">Processando...</td></tr>
            </tbody>
        </table>
        <button class="btn-estatisticas" onclick="toggleStats()">Ver Mais</button>
    </div>

    <div class="controles">
        <button class="btn btn-refresh" onclick="location.reload()">Statusc</button>
        <button class="btn" id="btn-perdas" onclick="setFiltro('perdas')">Ocorrências</button>
        <button class="btn" id="btn-devolvidos" onclick="setFiltro('devolvidos')">Devoluções</button>
        <button class="btn" id="btn-tudo" onclick="setFiltro('tudo')">Histórico</button>
    </div>

    <div id="lista-feed"></div>

    <button class="btn-limpar" onclick="limparHistorico()">Zerar Sistema</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYe0mjBHOY9C-X2u3PzLkJZkmnWCcv8gc",
        authDomain: "up-controle-bd307.firebaseapp.com",
        projectId: "up-controle-bd307",
        storageBucket: "up-controle-bd307.firebasestorage.app",
        messagingSenderId: "56963795860",
        appId: "1:56963795860:web:eb9ba04de1ac98e7299d81"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let filtroAtivo = 'ativos';
    let globalSnap = [];
    let verTudoStats = false;

    db.collection("movimentacoes").orderBy("dataRegistro", "desc").onSnapshot(snap => {
        globalSnap = [];
        snap.forEach(doc => globalSnap.push({id: doc.id, ...doc.data()}));
        processarERenderizar();
    });

    function processarERenderizar() {
        let eventosAgrupados = {};
        let eventosMap = {}; 
        let crescimentoMap = {};
        let eventosConcluidos = new Set();
        const agora = new Date();
        const mesAtualAbrev = agora.toLocaleString('pt-BR', { month: 'short' }).replace('.', '');

        globalSnap.forEach(d => {
            const chaveEv = (d.evento.toUpperCase().trim() + d.dataEvento).replace(/\s+/g, '');
            if (d.tipo === 'Correção') {
                const chaveOriginal = chaveEv + 'Saída';
                if (eventosAgrupados[chaveOriginal]) {
                    eventosAgrupados[chaveOriginal].itens = d.itens;
                    eventosAgrupados[chaveOriginal].correcoes = (eventosAgrupados[chaveOriginal].correcoes || 0) + 1;
                }
                return;
            }
            const chaveCard = chaveEv + d.tipo;
            if (!eventosAgrupados[chaveCard]) {
                eventosAgrupados[chaveCard] = { ...d, correcoes: 0 };
            }
        });

        let listaFinal = Object.values(eventosAgrupados);

        listaFinal.forEach(m => {
            const dReg = new Date(m.dataRegistro);
            const mesAbrev = dReg.toLocaleString('pt-BR', { month: 'short' }).replace('.', '');
            const chaveEv = (m.evento.toUpperCase().trim() + m.dataEvento).replace(/\s+/g, '');
            
            if (!eventosMap[chaveEv]) eventosMap[chaveEv] = { s: 0, v: 0 };
            let soma = Object.values(m.itens).reduce((a, b) => a + (parseInt(b) || 0), 0);
            
            if (m.tipo === 'Saída') {
                eventosMap[chaveEv].s += soma;
                if (!crescimentoMap[mesAbrev]) crescimentoMap[mesAbrev] = { count: new Set(), itens: 0, date: dReg };
                crescimentoMap[mesAbrev].count.add(chaveEv);
                crescimentoMap[mesAbrev].itens += soma;
            }
            if (m.tipo === 'Devolução') eventosMap[chaveEv].v += soma;
        });

        let naRuaTotal = 0;
        for (let ev in eventosMap) {
            if (eventosMap[ev].s > 0 && eventosMap[ev].s === eventosMap[ev].v) {
                eventosConcluidos.add(ev);
            } else if (eventosMap[ev].s > 0) {
                naRuaTotal++;
            }
        }

        document.getElementById('an-mes').innerText = crescimentoMap[mesAtualAbrev] ? crescimentoMap[mesAtualAbrev].count.size : 0;
        document.getElementById('an-rua').innerText = naRuaTotal;
        document.getElementById('an-ok').innerText = eventosConcluidos.size;

        renderizarTabela(crescimentoMap);
        renderizarFeed(listaFinal, eventosConcluidos);
    }

    function renderizarTabela(map) {
        const corpo = document.getElementById('corpo-crescimento');
        corpo.innerHTML = "";
        const ordenados = Object.keys(map).sort((a, b) => map[b].date - map[a].date);
        const limite = verTudoStats ? ordenados.length : 2;
        ordenados.slice(0, limite).forEach(mes => {
            corpo.innerHTML += `<tr><td style="text-transform:capitalize">${mes}</td><td><b>${map[mes].count.size}</b> eventos</td><td style="text-align:right">${map[mes].itens} itens</td></tr>`;
        });
    }

    function toggleStats() {
        verTudoStats = !verTudoStats;
        document.querySelector('.btn-estatisticas').innerText = verTudoStats ? 'Ver Menos' : 'Ver Mais';
        processarERenderizar();
    }

    function renderizarFeed(lista, concluidos) {
        const feed = document.getElementById('lista-feed');
        feed.innerHTML = "";
        
        let filtrados = lista;
        if (filtroAtivo === 'ativos') {
            filtrados = lista.filter(d => d.tipo === 'Saída' && !concluidos.has((d.evento.toUpperCase().trim() + d.dataEvento).replace(/\s+/g, '')));
        } else if (filtroAtivo === 'perdas') {
            filtrados = lista.filter(d => d.justificativa);
        } else if (filtroAtivo === 'devolvidos') {
            filtrados = lista.filter(d => d.tipo === 'Devolução');
        }

        filtrados.forEach(m => {
            const dt = new Date(m.dataRegistro).toLocaleString("pt-BR", {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
            let itTxt = "";
            for (let i in m.itens) if(m.itens[i] > 0) itTxt += `<b>${m.itens[i]}</b> ${i}, `;
            itTxt = itTxt.replace(/, $/ , "");

            const chave = (m.evento.toUpperCase().trim() + m.dataEvento).replace(/\s+/g, '');
            const ok = concluidos.has(chave);

            let iconType = "pendente"; let iconName = "clock";
            if(m.tipo === 'Saída') { iconType = "saida"; iconName = "external-link"; }
            if(m.tipo === 'Devolução') { iconType = "devolucao"; iconName = "check-circle"; }
            if(m.justificativa) { iconType = "erro"; iconName = "alert-triangle"; }

            feed.innerHTML += `
                <div class="registro-card ${ok && filtroAtivo === 'tudo' ? 'modo-concluido' : ''}">
                    ${m.correcoes > 0 ? `<div class="badge-edit">✏️ EDITADO</div>` : ""}
                    <div class="reg-top-row">
                        <div class="icon-circle icon-${iconType}">
                            <i data-lucide="${iconName}" style="width:20px; height:20px; stroke-width:2.2"></i>
                        </div>
                        <div class="reg-content">
                            <div class="reg-nome">${m.evento.toUpperCase()}</div>
                            <div class="reg-sub">${dt} • ${m.responsavel.toUpperCase()}</div>
                        </div>
                    </div>
                    <div class="reg-resumo">${itTxt}</div>
                    ${m.justificativa ? `<div class="justificativa-box"><i data-lucide="info" style="width:12px"></i> ${m.justificativa}</div>` : ''}
                </div>`;
        });
        lucide.createIcons();
    }

    function setFiltro(t) {
        filtroAtivo = (filtroAtivo === t) ? 'ativos' : t;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('btn-ativo'));
        if(filtroAtivo !== 'ativos') document.getElementById('btn-' + t).classList.add('btn-ativo');
        processarERenderizar();
    }

    async function limparHistorico() {
        const senha = prompt("Senha Master:");
        if (senha === "admin123") {
            if (confirm("Deseja zerar o sistema?")) {
                const res = await db.collection("movimentacoes").get();
                const batch = db.batch();
                res.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                location.reload();
            }
        }
    }
</script>
</body>
</html>
